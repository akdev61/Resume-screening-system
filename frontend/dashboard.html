<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard · RecruitAI</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      RecruitAI
    </a>
    <nav class="sidebar-section">
      <a href="/dashboard" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/jobs-page" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Jobs
      </a>
      <a href="/settings-page" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" onclick="logout()">
        <div class="user-avatar-sm" id="sidebar-user-avatar">AK</div>
        <div>
          <div class="user-name" id="sidebar-user-name">Loading…</div>
          <div class="user-email" id="sidebar-user-email"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left"><span class="page-title">Dashboard</span></div>
      <div class="topbar-right">
        <a href="/jobs-page" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New job
        </a>
      </div>
    </header>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-grid" id="stats">
        <div class="stat-card"><div class="stat-label">Total jobs</div><div class="stat-value" id="stat-jobs">—</div></div>
        <div class="stat-card"><div class="stat-label">Resumes uploaded</div><div class="stat-value" id="stat-resumes">—</div></div>
        <div class="stat-card"><div class="stat-label">Jobs screened</div><div class="stat-value green" id="stat-screened">—</div></div>
      </div>

      <!-- Recent jobs -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <span class="font-semibold" style="font-size:14px;">Recent jobs</span>
        <a href="/jobs-page" class="btn btn-ghost btn-sm">View all →</a>
      </div>

      <div id="jobs-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="/static/app.js"></script>
<script>
requireAuth();
renderUserChip();

async function load() {
  try {
    const jobs = await http.get('/jobs');
    document.getElementById('stat-jobs').textContent = jobs.length;

    let totalResumes = 0;
    let screened = 0;

    const container = document.getElementById('jobs-list');

    if (jobs.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          <h3>No jobs yet</h3>
          <p>Create your first job posting to start screening resumes</p>
          <a href="/jobs-page" class="btn btn-primary mt-4">Create a job</a>
        </div>`;
      document.getElementById('stat-resumes').textContent = '0';
      document.getElementById('stat-screened').textContent = '0';
      return;
    }

    // Show most recent 5
    const recent = jobs.slice(0, 5);
    container.innerHTML = recent.map(j => {
      const statusBadge = `<span class="badge badge-gray">New</span>`;
      return `
      <div class="job-card" style="margin-bottom:10px;flex-direction:row;align-items:center;padding:14px 18px;gap:14px;">
        <div style="flex:1;min-width:0;">
          <div class="job-card-title">${esc(j.job_title)}</div>
          <div class="text-muted text-sm mt-4" style="margin-top:4px;">${timeAgo(j.created_at)}</div>
        </div>
        <div class="flex gap-2 items-center">
          <a href="/jobs-page?open=${j.crud_id}" class="btn btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
          </a>
          <a href="/jobs-page?screen=${j.crud_id}" class="btn btn-sm btn-success">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Screen
          </a>
        </div>
      </div>`;
    }).join('');

    document.getElementById('stat-resumes').textContent = '—';
    document.getElementById('stat-screened').textContent = jobs.length;
  } catch(e) {
    toast(e.message, 'error');
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
