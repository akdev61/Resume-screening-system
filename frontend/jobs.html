<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jobs · RecruitAI</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      RecruitAI
    </a>
    <nav class="sidebar-section">
      <a href="/dashboard" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/jobs-page" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Jobs
      </a>
      <a href="/settings-page" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" onclick="logout()">
        <div class="user-avatar-sm" id="sidebar-user-avatar">AK</div>
        <div>
          <div class="user-name" id="sidebar-user-name">Loading…</div>
          <div class="user-email" id="sidebar-user-email"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Jobs</span>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search jobs…" oninput="filterJobs()" />
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('job-modal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New job
        </button>
      </div>
    </header>

    <div class="page-body">
      <div class="jobs-grid" id="jobs-grid">
        <div class="add-job-card" onclick="openModal('job-modal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Create new job</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Create / Edit Job Modal ── -->
<div class="modal-backdrop" id="job-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="job-modal-title">New job posting</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('job-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-crud-id" />
      <div class="field">
        <label class="field-label">Job title</label>
        <input type="text" id="job-title" placeholder="e.g. Senior Python Developer" />
      </div>
      <div class="field">
        <label class="field-label">Job description</label>
        <textarea id="job-desc" rows="5" placeholder="Describe the role, required skills, and responsibilities…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('job-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-job-btn" onclick="saveJob()">Create job</button>
    </div>
  </div>
</div>

<!-- ── Upload Resumes Modal ── -->
<div class="modal-backdrop" id="upload-modal">
  <div class="modal" style="width:560px">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="upload-modal-title">Upload resumes</div>
        <div class="text-sm text-muted" id="upload-modal-sub"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeUpload()">✕</button>
    </div>
    <div class="modal-body">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="drop-title">Drop PDF resumes here</div>
        <div class="drop-sub">or <span class="drop-link">browse files</span> · PDF only · multiple allowed</div>
      </div>
      <input type="file" id="file-input" accept=".pdf" multiple style="display:none" onchange="handleFiles(this.files)" />
      <div class="file-list" id="file-list"></div>
    </div>
    <div class="modal-footer" style="justify-content:space-between;align-items:center;">
      <span class="text-sm text-muted" id="upload-count">No files selected</span>
      <div class="flex gap-2">
        <button class="btn" onclick="closeUpload()">Cancel</button>
        <button class="btn btn-primary" id="upload-btn" onclick="doUpload()" disabled>Upload</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Results Modal ── -->
<div class="modal-backdrop" id="results-modal">
  <div class="modal" style="width:720px;max-width:calc(100vw - 32px)">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="results-modal-title">Screening results</div>
        <div class="text-sm text-muted" id="results-modal-sub"></div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-sm btn-success" id="rescreen-btn" onclick="runScreen()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Re-screen
        </button>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('results-modal')">✕</button>
      </div>
    </div>
    <div class="modal-body" style="padding:0;">
      <div id="results-loading" style="padding:40px;text-align:center;color:var(--text-3);">Loading…</div>
      <div class="tbl-wrap" id="results-table-wrap" style="display:none;">
        <table>
          <thead><tr>
            <th style="width:36px">#</th>
            <th>Resume</th>
            <th style="width:200px">Match score</th>
            <th>Matched keywords</th>
          </tr></thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/app.js"></script>
<script>
requireAuth();
renderUserChip();

let _jobs = [];
let _uploadCrudId = null;
let _resultsCrudId = null;
let _pendingFiles = [];

// ── Load jobs ──────────────────────────────────────
async function loadJobs() {
  try {
    _jobs = await http.get('/jobs');
    renderGrid(_jobs);
    checkUrlParams();
  } catch(e) { toast(e.message, 'error'); }
}

function checkUrlParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('open')) openUpload(p.get('open'));
  if (p.get('screen')) openResults(p.get('screen'), true);
}

function renderGrid(jobs) {
  const grid = document.getElementById('jobs-grid');
  const addBtn = `<div class="add-job-card" onclick="openModal('job-modal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Create new job</span>
  </div>`;

  if (jobs.length === 0) {
    grid.innerHTML = addBtn; return;
  }
  grid.innerHTML = jobs.map(j => `
    <div class="job-card" id="jcard-${j.crud_id}">
      <div class="job-card-top">
        <div class="job-card-title">${esc(j.job_title)}</div>
      </div>
      <div class="job-card-desc">${esc(j.job_description)}</div>
      <div class="job-card-footer">
        <span class="job-card-meta">${fmtDate(j.created_at)}</span>
        <div class="job-card-actions">
          <button class="icon-btn" title="View results" onclick="openResults('${j.crud_id}', false)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </button>
          <button class="icon-btn" title="Upload resumes" onclick="openUpload('${j.crud_id}', '${esc(j.job_title)}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="icon-btn" title="Edit job" onclick="editJob('${j.crud_id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn danger" title="Delete job" onclick="deleteJob('${j.crud_id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
    </div>
  `).join('') + addBtn;
}

function filterJobs() {
  const q = document.getElementById('search').value.toLowerCase();
  renderGrid(q ? _jobs.filter(j => j.job_title.toLowerCase().includes(q) || j.job_description.toLowerCase().includes(q)) : _jobs);
}

// ── Create / Edit job ───────────────────────────────
function openCreateModal() {
  document.getElementById('edit-crud-id').value = '';
  document.getElementById('job-title').value = '';
  document.getElementById('job-desc').value = '';
  document.getElementById('job-modal-title').textContent = 'New job posting';
  document.getElementById('save-job-btn').textContent = 'Create job';
  openModal('job-modal');
}

function editJob(crudId) {
  const j = _jobs.find(x => x.crud_id === crudId);
  if (!j) return;
  document.getElementById('edit-crud-id').value = j.crud_id;
  document.getElementById('job-title').value = j.job_title;
  document.getElementById('job-desc').value = j.job_description;
  document.getElementById('job-modal-title').textContent = 'Edit job posting';
  document.getElementById('save-job-btn').textContent = 'Save changes';
  openModal('job-modal');
}

async function saveJob() {
  const crudId = document.getElementById('edit-crud-id').value;
  const title = document.getElementById('job-title').value.trim();
  const desc = document.getElementById('job-desc').value.trim();
  const btn = document.getElementById('save-job-btn');

  if (!title) { toast('Job title is required', 'error'); return; }
  if (desc.length < 10) { toast('Description must be at least 10 characters', 'error'); return; }

  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    if (crudId) {
      await http.put(`/jobs/${crudId}`, { job_title: title, job_description: desc });
      toast('Job updated');
    } else {
      await http.post('/jobs', { job_title: title, job_description: desc });
      toast('Job created');
    }
    closeModal('job-modal');
    loadJobs();
  } catch(e) { toast(e.message, 'error'); }
  finally {
    btn.innerHTML = crudId ? 'Save changes' : 'Create job';
    btn.disabled = false;
  }
}

async function deleteJob(crudId) {
  if (!confirm('Delete this job and all its resumes? This cannot be undone.')) return;
  try {
    await http.delete(`/jobs/${crudId}`);
    toast('Job deleted');
    loadJobs();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Upload ──────────────────────────────────────────
function openUpload(crudId, title) {
  _uploadCrudId = crudId;
  _pendingFiles = [];
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('upload-count').textContent = 'No files selected';
  document.getElementById('upload-btn').disabled = true;
  document.getElementById('file-input').value = '';
  const j = _jobs.find(x => x.crud_id === crudId);
  document.getElementById('upload-modal-title').textContent = 'Upload resumes';
  document.getElementById('upload-modal-sub').textContent = j ? j.job_title : '';
  openModal('upload-modal');
  setupDrop();
}

function closeUpload() {
  closeModal('upload-modal');
  _uploadCrudId = null;
  _pendingFiles = [];
}

function setupDrop() {
  const zone = document.getElementById('drop-zone');
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); };
}

function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (files.length !== fileList.length) toast('Only PDF files are allowed — others were skipped', 'info');
  _pendingFiles = [..._pendingFiles, ...files];
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = _pendingFiles.map((f, i) => `
    <div class="file-row">
      <div class="file-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${(f.size / 1024).toFixed(0)} KB</div>
      </div>
      <button class="icon-btn danger" onclick="removeFile(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
  const n = _pendingFiles.length;
  document.getElementById('upload-count').textContent = n ? `${n} file${n>1?'s':''} ready` : 'No files selected';
  document.getElementById('upload-btn').disabled = n === 0;
}

function removeFile(i) {
  _pendingFiles.splice(i, 1);
  renderFileList();
}

async function doUpload() {
  if (!_pendingFiles.length || !_uploadCrudId) return;
  const btn = document.getElementById('upload-btn');
  btn.innerHTML = '<span class="spinner"></span> Uploading…';
  btn.disabled = true;

  try {
    const form = new FormData();
    _pendingFiles.forEach(f => form.append('files', f));
    const res = await http.postForm(`/jobs/${_uploadCrudId}/resumes/upload`, form);
    toast(res.message);
    closeUpload();
  } catch(e) { toast(e.message, 'error'); }
  finally { btn.innerHTML = 'Upload'; btn.disabled = false; }
}

// ── Results ─────────────────────────────────────────
async function openResults(crudId, autoScreen) {
  _resultsCrudId = crudId;
  const j = _jobs.find(x => x.crud_id === crudId);
  document.getElementById('results-modal-title').textContent = j ? j.job_title : 'Screening results';
  document.getElementById('results-modal-sub').textContent = 'Sorted by match score';
  document.getElementById('results-loading').style.display = 'block';
  document.getElementById('results-table-wrap').style.display = 'none';
  openModal('results-modal');

  if (autoScreen) {
    await runScreen();
  } else {
    await loadResults();
  }
}

async function loadResults() {
  try {
    const rows = await http.get(`/jobs/${_resultsCrudId}/resumes/screen/results`);
    renderResults(rows);
  } catch(e) {
    document.getElementById('results-loading').textContent = 'No results yet — run screening first.';
  }
}

async function runScreen() {
  const btn = document.getElementById('rescreen-btn');
  btn.innerHTML = '<span class="spinner"></span> Screening…';
  btn.disabled = true;
  document.getElementById('results-loading').style.display = 'block';
  document.getElementById('results-loading').textContent = 'Screening resumes…';
  document.getElementById('results-table-wrap').style.display = 'none';
  try {
    const rows = await http.post(`/jobs/${_resultsCrudId}/resumes/screen`);
    renderResults(rows);
    toast(`Screened ${rows.length} resume${rows.length !== 1 ? 's' : ''}`);
  } catch(e) {
    document.getElementById('results-loading').textContent = e.message;
    toast(e.message, 'error');
  } finally {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Re-screen`;
    btn.disabled = false;
  }
}

function renderResults(rows) {
  document.getElementById('results-loading').style.display = 'none';
  document.getElementById('results-table-wrap').style.display = '';
  document.getElementById('results-modal-sub').textContent = `${rows.length} resume${rows.length !== 1 ? 's' : ''} screened · sorted by match score`;
  const tbody = document.getElementById('results-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-3);padding:32px;">No resumes uploaded for this job yet.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((r, i) => {
    const initials = r.filename.substring(0, 2).toUpperCase();
    const cls = scoreColor(r.score);
    const bar = barClass(r.score);
    const keywords = r.matched_keywords
      ? r.matched_keywords.split(',').slice(0, 6).map(k => `<span class="pill">${esc(k.trim())}</span>`).join('')
      : '<span class="text-muted text-sm">—</span>';
    return `
    <tr>
      <td style="color:var(--text-3);font-weight:600;">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar ${['avatar-blue','avatar-green','avatar-amber','avatar-red'][i%4]}">${initials}</div>
          <span style="font-size:13px;font-weight:500;">${esc(r.filename)}</span>
        </div>
      </td>
      <td>
        <div class="score-cell">
          <span class="score-num ${cls}">${r.score}%</span>
          <div class="bar-bg"><div class="bar-fill ${bar}" style="width:${r.score}%"></div></div>
        </div>
      </td>
      <td>${keywords}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
loadJobs();
</script>
</body>
</html>
