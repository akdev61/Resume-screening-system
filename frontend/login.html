<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in · RecruitAI</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      RecruitAI
    </div>
    <h1 class="auth-heading">Welcome back</h1>
    <p class="auth-sub">Sign in to your recruiter account</p>
    <div id="err" class="auth-error"></div>
    <div class="form-stack">
      <div class="field">
        <label class="field-label">Email address</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" />
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary w-full" id="login-btn" onclick="doLogin()">
        Sign in
      </button>
    </div>
    <div class="auth-link-row">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>
<div id="toast"></div>
<script src="/static/app.js"></script>
<script>
requireGuest();
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('login-btn');
  err.className = 'auth-error';

  if (!email || !password) { showErr('Please enter your email and password.'); return; }

  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  btn.disabled = true;

  try {
    const form = new FormData();
    form.append('username', email);
    form.append('password', password);
    const data = await http.postForm('/auth/login', form);
    setToken(data.access_token);
    const me = await http.get('/auth/me');
    setUser(me);
    window.location.href = '/dashboard';
  } catch (e) {
    showErr(e.message);
    btn.innerHTML = 'Sign in';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.className = 'auth-error show';
}
</script>
</body>
</html>
